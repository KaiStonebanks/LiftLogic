{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - LiftLogic</title>
    <link rel="stylesheet" href="{% static 'rango/css/style.css' %}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1> Contact Us</h1>
            <div class="header-buttons">
                <a href="{% url 'home' %}" class="btn btn-secondary"> HomePage</a>
                <a href="{% url 'about_us' %}" class="btn btn-secondary"> About Us</a>
                <a href="{% url 'faqs' %}" class="btn btn-secondary"> FAQs</a>
            </div>
        </div>

        <div style="max-width: 700px; margin: 0 auto;">
            <div style="background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 40px; border-radius: 20px;">
                <h2 style="margin-bottom: 25px;">We'd love to hear from you!</h2>

                <form method="post">
                    {% csrf_token %}

                    <div style="margin-bottom: 20px;">
                        <label for="name" style="display: block; margin-bottom: 8px;"><strong>Name</strong></label>
                        <input type="text" id="name" name="name" placeholder="Enter your full name" 
                        style="width: 100%; padding: 12px; border-radius: 10px; border: none;">
                    </div>

                    <div style="margin-bottom: 20px;">
                        <label for="phone" style="display: block; margin-bottom: 8px;"><strong>Phone Number</strong></label>
                        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" 
                        style="width: 100%; padding: 12px; border-radius: 10px; border: none;">
                    </div>

                    <div style="margin-bottom: 20px;">
                        <label for="email" style="display: block; margin-bottom: 8px;"><strong>Email Address</strong></label>
                        <input type="email" id="email" name="email" placeholder="Enter your email address" 
                        style="width: 100%; padding: 12px; border-radius: 10px; border: none;">
                    </div>

                    <div style="margin-bottom: 20px;">
                        <label for="notes" style="display: block; margin-bottom: 8px;"><strong>Notes:</strong></label>
                        <textarea id="notes" name="notes" rows="6" placeholder="Type your message here..." 
                        style="width: 100%; padding: 12px; border-radius: 10px; border: none; resize: verticle;"></textarea>
                    </div>

                    <div style="margin-bottom: 20px; display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="callback" name="email">
                        <label for="callback"><strong>I would prefer a callback</strong></label>
                    </div>

                    <button type="submit" class="btn btn-primary">Send Message</button>

                </form>
            </div>
        </div>
    </div>
</body>
