{% extends 'rango/base.html' %}
{% block title %}Contact Us{% endblock %}
{% block content %}
<div class="card card-sm">
    <h1 style="margin-bottom: 1.5rem;">Contact Us</h1>
    <form method="post" action="#">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            <label for="name" style="display: block; margin-bottom: 5px; font-weight: 600;">Name</label>
            <input type="text" id="name" name="name" placeholder="Enter full name" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text);">
        </div>
        <div style="margin-bottom: 15px;">
            <label for="email" style="display: block; margin-bottom: 5px; font-weight: 600;">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter email" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text);">
        </div>
        <div style="margin-bottom: 15px;">
            <label for="notes" style="display: block; margin-bottom: 5px; font-weight: 600;">Notes</label>
            <textarea id="notes" name="notes" rows="4" placeholder="Type your message here..." style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text); resize: vertical;"></textarea>
        </div>
        <div style="margin-bottom: 15px; display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="callback" name="callback">
            <label for="callback" style="color: var(--text-muted);">I would prefer a callback</label>
        </div>
        <button type="button" class="btn-primary" style="padding: 0.5rem 1.5rem;" data-url="{% url 'home' %}" onclick="alert('Message Sent!'); window.location.href=this.getAttribute('data-url');">Send Message</button>
    </form>
</div>
{% endblock %}
