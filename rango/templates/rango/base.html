<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiftLogic - {% block title %}Home{% endblock %}</title>
    {% load static %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'home' %}" class="nav-logo">LiftLogic</a>
            <div class="nav-links">
                {% if user.is_authenticated %}
                <a href="{% url 'home' %}">Home</a>
                <a href="{% url 'leaderboard' %}">Leaderboard</a>
                <a href="{% url 'profile' %}">Profile</a>
                <form action="{% url 'logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn-link">Logout</button>
                </form>
                {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}" class="btn-primary">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}
        {% endblock content %}
    </main>

    <footer class="global-footer">
        <hr style="border-color: rgba(255,255,255,0.1); margin-bottom: 2rem;">
        <a href="{% url 'about_us' %}" class="btn-link" style="margin: 0 10px;">About Us</a>
        <a href="{% url 'contact_us' %}" class="btn-link" style="margin: 0 10px;">Contact Us</a>
        <a href="{% url 'guides' %}" class="btn-link" style="margin: 0 10px;">Guides</a>
    </footer>
    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
