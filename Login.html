<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>

*{
    box-sizing: border-box;
    margin:0;
    padding:0;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    font-family: Arial, sans-serif;
    background:url("Media.jpg") no-repeat center center/cover;
}


body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(200,210,230,0.6);
}


.card{
    position:relative;
    background:#ffffff;
    padding:35px;
    width:340px;
    border-radius:8px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    text-align:left;
}

.card h1{
    font-size:20px;
    margin-bottom:5px;
}

.card p{
    font-size:13px;
    color:#777;
    margin-bottom:20px;
}

label{
    font-size:12px;
    font-weight:bold;
    display:block;
    margin-bottom:5px;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:15px;
    border:none;
    background:#f1f1f1;
    border-radius:4px;
    font-size:13px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    background:#0f0f2d;
    color:white;
    border-radius:4px;
    font-size:14px;
    cursor:pointer;
}

button:hover{
    background:#1f1f55;
}

.footer{
    text-align:center;
    margin-top:15px;
    font-size:12px;
}

.footer a{
    text-decoration:none;
    color:#000;
}

</style>
</head>

<body>

<div class="card">

<h1>Welcome Back</h1>
<p>Login to achieve greatness</p>

<form id="loginForm"></form>

<label>Email</label>
<input type="email" placeholder="Enter your email">

<label>Password</label>
<input type="password" placeholder="Enter your password">

<button>Login</button>

</form>

<p class="footer">Don't have an account? <a href="Register.html">Register</a></p>

</div>


<script> document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault(); 

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    // Dummy check till django ready 
    if (username === "testuser" && password === "testpass123") {
        window.location.href = "dashboard.html"; 
    } else {
        document.getElementById("errorMsg").textContent = "Invalid credentials";
    }
});
</script>
</body>
</html>
